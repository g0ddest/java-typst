name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-native:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: libtypst_java.so
            platform: linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: libtypst_java.so
            platform: linux-aarch64
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: libtypst_java.dylib
            platform: macos-x86_64
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: libtypst_java.dylib
            platform: macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: typst_java.dll
            platform: windows-x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: ${{ matrix.platform == 'linux-aarch64' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('native/Cargo.lock') }}

      - name: Build native library
        working-directory: native
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.platform == 'linux-aarch64' && 'aarch64-linux-gnu-gcc' || '' }}

      - name: Run Rust tests
        if: ${{ !matrix.cross }}
        working-directory: native
        run: cargo test

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.platform }}
          path: native/target/${{ matrix.target }}/release/${{ matrix.artifact }}

  test-java:
    needs: build-native
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: macos-latest
            platform: macos-aarch64
          - os: windows-latest
            platform: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: oracle
          cache: maven

      - name: Download native library
        uses: actions/download-artifact@v4
        with:
          name: native-${{ matrix.platform }}
          path: target/classes/native/${{ matrix.platform }}

      - name: Run Java tests
        run: mvn test -B "-Dexec.skip=true"

  quality-gate:
    needs: [ build-native, test-java ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: oracle
          cache: maven

      - name: Download native library
        uses: actions/download-artifact@v4
        with:
          name: native-linux-x86_64
          path: target/classes/native/linux-x86_64

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build and analyze
        if: env.SONAR_TOKEN != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >-
          mvn verify sonar:sonar -B
          -Dexec.skip=true
          -Dsonar.projectKey=${{ github.repository_owner }}_java-typst
          -Dsonar.organization=${{ github.repository_owner }}
          -Dsonar.host.url=https://sonarcloud.io
          ${{ github.event_name == 'push' && format('-Dsonar.branch.name={0}', github.ref_name) || '' }}
          -Dsonar.branch.name=main
